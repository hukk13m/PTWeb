<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <form action="contactpage.html" method="get">
            <h3>Contact the editorial office</h3>
            <br />
            <label for="Full Name">Full Name</label>
            <br />
            <input
                type="text"
                id="Full Name"
                name="Full Name"
                style="width: 100%; height: 30px"
            />
            <br />
            <br />

            <table style="width: 100%; height: 5px">
                <tr>
                    <td style="width: 50%">
                        <label for="Email">Email</label>
                    </td>
                    <td style="width: 50%">
                        <label for="Send to">Send to</label>
                    </td>
                </tr>
            </table>
            <input
                type="text"
                id="Email"
                name="Email"
                style="width: 49%; height: 30px"
            />
            <select
                name="Send to"
                id="Send to"
                style="width: 49%; height: 30px"
            >
                <option value="E">Editorial Board</option>
                <option value="N">News Department</option>
                <option value="B">Boards of Perspective</option>
                <option value="W">World Board</option>
                <option value="D">Business Department</option>
            </select>
            <br />
            <br />

            <label for="Title">Title</label>
            <br />

            <input
                type="text"
                id="Title"
                name="Title"
                style="width: 100%; height: 30px"
            /><br />
            <br />

            <label for="Content">Content</label>
            <br />

            <input
                type="text"
                id="Content"
                name="Content"
                style="width: 100%; height: 300px"
            />
            <br />
            <br />
            <div class="button">
                <input
                    type="submit"
                    name="submit"
                    id="submit"
                    value="Send"
                    style="
                        height: 50px;
                        width: 75px;
                        background-color: rgb(185, 20, 20);
                        color: white;
                        font-weight: bolder;
                        border-radius: 5px;
                    "
                />
            </div>
        </form>
    </body>
</html>
