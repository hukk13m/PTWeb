<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <body>
            <marquee
                direction="right"
                behavior="scroll"
                loop="-1"
                scrollamount="10"
            >
                Run from right to right, scroll mode, continuous loop, running
                speed 10
            </marquee>
            <marquee
                direction="left"
                behavior="slide"
                loop="1"
                scrollamount="10"
            >
                Run from left to left, slide style, repeat 1 time, running speed
                10
            </marquee>
            <marquee
                direction="down"
                behavior="scroll"
                loop="-1"
                scrollamount="10"
            >
                <img src="../Ex27/ex27/images/Grepon.jpg" alt="">
            </marquee>
            <marquee
                direction="up"
                behavior="scroll"
                loop="1"
                scrollamount="10"
            >
                <p align="center">
                    Run from the bottom up, scroll mode, repeat 1 time, running
                    speed 10
                </p>
            </marquee>
        </body>
    </body>
</html>
