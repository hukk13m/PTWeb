<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script src="Js/mainjs.js"></script>
        <script type="text/javascript">
            function kiemtra(a) {
                anumber = eval(a);
                kq = isEven(anumber);
                if (kq == true) {
                    alert(a + "là số chẵn");
                } else {
                    alert(a + "là số lẻ");
                }
            }
        </script>
    </head>
    <body>
        <h1>Kiểm tra số chẵn hay lẻ</h1>
        <p>Nhập số:</p>
        <input type="number" id="soa" />
        <p></p>
        <input
            type="button"
            name="chanle"
            id="chanle"
            value="Ktrchanle"
            onclick="kiemtra(soa.value)"
        />
    </body>
</html>
