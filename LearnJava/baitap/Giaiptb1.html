<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script type="text/javascript">
            function xuLyGiai(a, b, ketqua) {
                //ketqua.value = -eval(b) / eval(a);
                kq = ptb1(eval(a), eval(b));
                ketqua.value = kq;
            }
            function ptb1(a, b) {
                return -b / a;
            }
        </script>
    </head>
    <body>
        <form action="">
            <table>
                <tr>
                    <td colspan="2">Phương trình bậc 1</td>
                </tr>
                <tr>
                    <td>
                        <label for="hsa">Hệ số a:</label
                        ><input type="text" id="hsa" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="hsb">Hệ số b:</label
                        ><input type="text" id="hsb" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="ketqua">Kết quả: </label
                        ><input type="text" id="ketqua" />
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input
                            type="button"
                            value="Giải"
                            onclick="xuLyGiai(hsa.value, hsb.value, ketqua)"
                        />&nbsp
                        <input type="button" value="Thoát" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
